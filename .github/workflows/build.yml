name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release]
        # configuration: [Release, Debug]
        platform: [Win32]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg deps
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-x86-windows-static-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-x86-windows-static-

      - name: Cache vcpkg source downloads
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Activate vcpkg MSBuild integration
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" integrate install

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Config ${{matrix.configuration}} -Mode production

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cerf-${{matrix.configuration}}-${{matrix.platform}}
          path: ./build/
